name: "Custom Action Example"
on:
    workflow_dispatch:
    push:
permissions:
  models: read
jobs:
    custom_action:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: ./examples/action
              id: genai
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
